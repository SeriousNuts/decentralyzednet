name: Deploy Decentralyzed

on:
  push:
    branches: [master]
env:
  DOCKER_COMPOSE_FILENAME: docker-compose.yaml
  TAR_FILENAME: deploy-files.tar.gz
  HOME_DIR: /home/${{ secrets.SSH_USER }}


jobs:
  build_docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Get build number
      id: vars
      run: echo ${{ github.ref_name }}-${{ github.run_number }}

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ vars.DOCKER_HUB_URL }}
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ vars.DOCKER_HUB_URL }}/${{ secrets.DOCKER_HUB_USERNAME }}/${{ vars.PROJECT_NAME }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max


  deplyement_files_delivery:
    runs-on: ubuntu-latest
    needs: build_docker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare deployment files
        run: |
          # Копируем nginx.conf в корень проекта
          cp nginx/nginx.conf ./nginx.conf
          echo $TAR_FILENAME
          echo $DOCKER_COMPOSE_FILENAME
          # Создаем архив
          tar -czf $TAR_FILENAME \
            $DOCKER_COMPOSE_FILENAME \
            nginx.conf \
            .env
          
          # Удаляем временную копию
          rm -f nginx.conf

      - name: Deliver deploy file
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: $TAR_FILENAME
          target: $HOME_DIR

          strip_components: 0

  deploy_on_server:
    runs-on: ubuntu-latest
    needs: deplyement_files_delivery
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker rm ${{ vars.PROJECT_NAME }}
            set -e
            cd $HOME_DIR
            set -o allexport
            source .env
            set +o allexport
            
            # Создаем backup текущей конфигурации
            tar -czf backup_$(date +%Y%m%d_%H%M%S).tar.gz *.ini *.sql .env 2>/dev/null || true
            
            # Распаковываем новые файлы
            tar -xzf $TAR_FILENAME
            chmod 600 .env
            #Удаляем старые образы 
            # Pull latest image
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/${{ vars.PROJECT_NAME }}:${{ github.ref_name }}

            cp nginx.conf ./nginx/conf/nginx.conf
            
            # Stop and remove old containers
            docker compose -f $DOCKER_COMPOSE_FILENAME down
            
            # Start new containers
            docker compose -f $DOCKER_COMPOSE_FILENAME up -d
            
            # Clean up old images
            docker image prune -f
            
            # Remove deploy archive
            rm $TAR_FILENAME

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            sleep 15
            if curl --connect-timeout 5 http://localhost:${APP_PORT}/health | grep -c health; then
              docker compose -f $DOCKER_COMPOSE_FILENAME ps
              exit 0
            else
              docker compose -f $DOCKER_COMPOSE_FILENAME logs -f --tail 20 ${{ vars.PROJECT_NAME }}
              exit 1
            fi