services:
  # FastAPI приложение
  app:
    image: seriousnuts/decentralyzednet:master
    container_name: vpn-subscription-api
    restart: unless-stopped
    env_file:
      - .env  # Исправлено!
    networks:
      - internal-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${APP_PORT:-8000}/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx прокси
  nginx:
    image: nginx:alpine
    container_name: vpn-subscription-nginx
    restart: unless-stopped
    env_file:
      - .env  # Исправлено!
    ports:
      - "0.0.0.0:${INTERNAL_HTTPS_PORT:-443}:${INTERNAL_HTTPS_PORT:-443}"
    volumes:
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - internal-network
      - external-network
    healthcheck:
      test: ["CMD", "curl", "-f", "https://localhost:${INTERNAL_HTTPS_PORT:-443}/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  internal-network:
    driver: bridge
  external-network:
    driver: bridge