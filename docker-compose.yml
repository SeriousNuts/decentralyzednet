version: '3.8'

services:
  # FastAPI приложение
  app:
    build: ./app
    container_name: vpn-subscription-api
    restart: unless-stopped
    environment:
      - .env
    networks:
      - internal-network
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${APP_PORT}/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx прокси
  nginx:
    image: nginx:alpine
    container_name: vpn-subscription-nginx
    restart: unless-stopped
    ports:
      - "${INTERNAL_HTTPS_PORT}:${INTERNAL_HTTPS_PORT}"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - internal-network
      - external-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "https://localhost/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  internal-network:
    driver: bridge
  external-network:
    driver: bridge